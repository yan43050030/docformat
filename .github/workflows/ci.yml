name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3 fonts-noto-cjk
      - name: Install Python dependencies
        run: pip install python-docx PyQt5
      - name: Engine smoke tests
        working-directory: docformat-qt
        run: python smoke_test.py
      - name: GUI tests (offscreen)
        working-directory: docformat-qt
        env:
          QT_QPA_PLATFORM: offscreen
        run: python gui_test.py
