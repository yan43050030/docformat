name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（如 v1.1.0），将作为 Release 标签'
        required: true
        default: 'v1.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: docformat-qt
        run: pip install -r requirements.txt pyinstaller

      - name: Run engine smoke tests
        working-directory: docformat-qt
        run: python smoke_test.py

      - name: Build DocFormatPro.exe
        working-directory: docformat-qt
        run: >
          python -m PyInstaller --noconfirm --clean --onefile --windowed
          --name DocFormatPro
          --collect-data docx
          --icon assets/icon.ico
          --add-data "assets;assets"
          --add-data "templates;templates"
          --hidden-import scripts.formatter
          --hidden-import scripts.punctuation
          --hidden-import scripts.analyzer
          --hidden-import scripts.converter
          --hidden-import win32com.client
          --hidden-import pythoncom
          main.py

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $ver = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.version }}' } else { '${{ github.ref_name }}' }
          Copy-Item docformat-qt/dist/DocFormatPro.exe "DocFormatPro-$ver-windows.exe"
          echo "RELEASE_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocFormatPro-windows
          path: DocFormatPro-*-windows.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: DocFormat Pro ${{ env.RELEASE_VERSION }}
          files: DocFormatPro-*-windows.exe
          body: |
            | 平台 | 文件 |
            |---|---|
            | Windows | `DocFormatPro-*-windows.exe`（免 Python 环境，双击运行） |
            | 麒麟/UOS x86_64 | `DocFormatPro-*-linux-x86_64.tar.gz` |
            | 麒麟/UOS 飞腾/鲲鹏 ARM | `DocFormatPro-*-linux-arm64.tar.gz` |

            Linux 包使用：`tar xzf 包名 && ./DocFormatPro`（在 Debian 10 / glibc 2.28
            环境构建，兼容麒麟 V10、统信 UOS 20 及更新系统）。

            **离线系统补充依赖**：若目标机器完全离线且缺少 Qt5/xcb 等系统库，
            请下载 [离线依赖应急包](../../releases/tag/deps-v1.0)（独立发布，只需下载一次）。
            使用方法：`tar xzf DocFormatPro-deps-*.tar.gz && bash DocFormatPro-deps-*/install_deps_offline.sh /path/to/DocFormatPro/`

  build-linux:
    # 在 Debian 10 (glibc 2.28) 容器内构建，保证麒麟 V10 / UOS 20 可运行；
    # ARM 版用 GitHub 的 arm64 构建机（飞腾/鲲鹏可用）
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build in Debian 10 container (glibc 2.28)
        run: |
          docker run --rm -v "$PWD":/work -w /work/docformat-qt debian:10 bash -euc '
            echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
            apt-get -o Acquire::Check-Valid-Until=false update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              python3-pip python3-setuptools python3-wheel python3-pyqt5 python3-lxml binutils
            # Debian 10 自带 pip 18 不认 manylinux2014 wheel，先升级（<24.1 仍支持 py3.7）；
            # python-docx 钉 0.8.11（1.x 需要 py3.8+），lxml 用系统包避免源码编译
            pip3 install --no-cache-dir --upgrade "pip<24.1"
            pip3 install --no-cache-dir "python-docx==0.8.11" "pyinstaller==5.13.2"
            python3 smoke_test.py
            python3 -m PyInstaller --noconfirm --clean --onefile --windowed \
              --name DocFormatPro \
              --collect-data docx \
              --add-data "assets:assets" \
              --add-data "templates:templates" \
              --hidden-import scripts.formatter \
              --hidden-import scripts.punctuation \
              --hidden-import scripts.analyzer \
              main.py
          '

      - name: Package tar.gz
        run: |
          ver='${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}'
          mkdir -p pkg/DocFormatPro
          sudo cp docformat-qt/dist/DocFormatPro pkg/DocFormatPro/
          cp docformat-qt/packaging/docformat.desktop pkg/DocFormatPro/ || true
          cp docformat-qt/assets/icon.png pkg/DocFormatPro/ || true
          sudo chmod +x pkg/DocFormatPro/DocFormatPro
          tar -czf "DocFormatPro-$ver-linux-${{ matrix.arch }}.tar.gz" -C pkg DocFormatPro
          echo "RELEASE_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocFormatPro-linux-${{ matrix.arch }}
          path: DocFormatPro-*-linux-*.tar.gz

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: DocFormatPro-*-linux-*.tar.gz
